<div class="bus-analytics-page">
  <div class="filters">
    <mat-form-field>
      <mat-label>Search</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Filter...">
    </mat-form-field>

    <mat-form-field>
      <mat-label>Route</mat-label>
      <mat-select [(value)]="selectedRoute" (selectionChange)="onFilterChange()">
        <mat-option value="">All</mat-option>
        @for (r of routes; track r) {
          <mat-option [value]="r">{{ r }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Operator</mat-label>
      <mat-select [(value)]="selectedOperator" (selectionChange)="onFilterChange()">
        <mat-option value="">All</mat-option>
        @for (op of operators; track op) {
          <mat-option [value]="op">{{ op }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    @if (loading) {
      <mat-spinner diameter="24"></mat-spinner>
    }
  </div>

  <div class="table-container">
    <table mat-table [dataSource]="dataSource" matSort>
      @for (col of displayedColumns; track col) {
        <ng-container [matColumnDef]="col">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ col }}</th>
          <td mat-cell *matCellDef="let row">{{ row[col] }}</td>
        </ng-container>
      }
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[25, 50, 100]" showFirstLastButtons></mat-paginator>
  </div>
</div>
